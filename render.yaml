# Render.com declarative deploy config.
# Connect your GitHub repo at render.com → "New" → "Blueprint" → pick this repo.
# Render reads this file and provisions the service on first push.
#
# After the service is up, go to its dashboard → Environment → and set
# GHOSTLINE_LICENSE_SECRET to the value you have in your local .env.
# That value is intentionally NOT in this file (sync: false below).
services:
  - type: web
    name: phantomline
    runtime: python
    plan: free           # Free tier: 512 MB RAM, sleeps after 15 min idle (cold start ~30s).
                         # Upgrade to "starter" ($7/mo) for always-on once billing is set up.
                         # Free tier has no persistent disk — output/ is ephemeral, but the
                         # user downloads renders immediately so loss-on-restart is acceptable.
    buildCommand: apt-get update && apt-get install -y ffmpeg && pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /
    autoDeploy: true     # auto-deploy on every push to main branch
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: GHOSTLINE_LICENSE_SECRET
        sync: false      # paste this in the Render dashboard, never in git
      # Account portal (Google sign-in via Supabase) — needed for /account.
      # SUPABASE_URL is the only one that's safe to embed in this file; the
      # anon key is publishable too but we keep it dashboard-only for symmetry.
      - key: SUPABASE_URL
        value: "https://vdzydhrgazqeyaalguuy.supabase.co"
      - key: SUPABASE_ANON_KEY
        sync: false      # publishable, but rotate independently of code
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false      # server-only — used to query licenses for any email
      - key: STRIPE_SECRET_KEY
        sync: false      # used for Customer Portal sessions
      - key: YOUTUBE_API_KEY_2
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: GHOSTLINE_TELEMETRY_URL
        sync: false      # optional — your Supabase function URL
