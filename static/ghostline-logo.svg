<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Ghostline logo</title>
  <desc id="desc">A cyan ghost-shaped motion line with a play button face.</desc>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.12 0 0 0 0 0.95 0 0 0 0 1 0 0 0 0.95 0" result="cyan"/>
      <feMerge>
        <feMergeNode in="cyan"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="line" x1="160" y1="800" x2="820" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0aa7b5" stop-opacity="0"/>
      <stop offset="0.24" stop-color="#22e7f5"/>
      <stop offset="0.62" stop-color="#a9ffff"/>
      <stop offset="1" stop-color="#1ee8f6"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" fill="none"/>
  <g filter="url(#glow)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M176 626c126-32 220-65 281-139 58-71 108-163 203-213 75-40 166-39 223 15 82 79 69 234 16 339-34 68-82 119-131 151" stroke="url(#line)" stroke-width="15"/>
