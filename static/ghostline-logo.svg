    <path d="M302 783c127-44 255-96 375-151" stroke="#22e7f5" stroke-width="8" opacity="0.75"/>
    <path d="M451 492c55-58 91-106 136-166" stroke="#26f3ff" stroke-width="9" opacity="0.95"/>
    <path d="M632 354c31 28 57 41 84 45-28 8-56 2-84-45Z" fill="#baffff" stroke="#20e9f5" stroke-width="5"/>
    <path d="M759 397c29-3 57-18 88-48-9 38-42 55-88 48Z" fill="#baffff" stroke="#20e9f5" stroke-width="5"/>
    <path d="M611 468l112 62-112 68V468Z" fill="#baffff" fill-opacity="0.16" stroke="#baffff" stroke-width="17"/>
    <path d="M260 561c133-31 212-25 274 12" stroke="#24eaf6" stroke-width="8" opacity="0.8"/>
    <path d="M560 820c98-31 183-84 256-155" stroke="#20e9f5" stroke-width="8" opacity="0.75"/>
